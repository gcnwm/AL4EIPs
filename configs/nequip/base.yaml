# yamllint disable rule:line-length
# NequIP training config for Cu/Al/Ni/Cu-Ni alloy systems
# Generated from LAMMPS EAM single-point calculation data (EXTXYZ format)
#
# Usage:
#   nequip-train -cn base.yaml -cp /absolute/path/to/configs/nequip
#
# Data units (LAMMPS metal): eV, Å, eV/Å (forces), eV/Å³ (stress)
#
# Reference: https://nequip.readthedocs.io/en/latest/guide/configuration/config.html


# ===========
#     RUN
# ===========
run: [train, test]


# =======================
#   SHARED PARAMETERS
# =======================
# These are referenced via variable interpolation throughout the config.

cutoff_radius: 5.0

# NequIP model hyperparameters (convenient for sweeps)
num_layers: 4
l_max: 1
num_features: 32

# Atom types known to the model (Cu, Al, Ni)
model_type_names: [Cu, Al, Ni]
chemical_species: ${model_type_names}

# Metric to condition checkpointing, early stopping, and LR scheduling on
monitored_metric: val0_epoch/weighted_sum


# ============
#     DATA
# ============
data:
  _target_: nequip.data.datamodule.ASEDataModule
  seed: 42

  # Split the combined dataset into train:val:test = 80:10:10
  split_dataset:
    file_path: ${hydra:runtime.cwd}/results/combined_dataset.xyz
    train: 0.8
    val: 0.1
    test: 0.1

  # Map our EXTXYZ keys to NequIP's internal field names.
  # Our postprocessor writes atoms.info["energy"] but NequIP expects "total_energy".
  # Forces and stress keys already match NequIP conventions.
  key_mapping:
    energy: total_energy

  transforms:
    - _target_: nequip.data.transforms.ChemicalSpeciesToAtomTypeMapper
      model_type_names: ${model_type_names}
    - _target_: nequip.data.transforms.NeighborListTransform
      r_max: ${cutoff_radius}

  train_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 5
    num_workers: 4
    shuffle: true
  val_dataloader:
    _target_: torch.utils.data.DataLoader
    batch_size: 10
    num_workers: ${data.train_dataloader.num_workers}
  test_dataloader: ${data.val_dataloader}

  stats_manager:
    _target_: nequip.data.CommonDataStatisticsManager
    type_names: ${model_type_names}
    dataloader_kwargs:
      batch_size: 10


# =============
#    TRAINER
# =============
trainer:
  _target_: lightning.Trainer
  accelerator: gpu           # User confirmed GPU available
  enable_checkpointing: true
  max_epochs: 500
  log_every_n_steps: 10

  # TensorBoard logger (no wandb dependency needed)
  logger:
    _target_: lightning.pytorch.loggers.TensorBoardLogger
    save_dir: ${hydra:runtime.output_dir}
    version: ${hydra:job.name}

  callbacks:
    # Early stopping
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: ${monitored_metric}
      min_delta: 1e-4
      patience: 50

    # Model checkpointing
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      monitor: ${monitored_metric}
      dirpath: ${hydra:runtime.output_dir}
      filename: best
      save_last: true

    # LR monitor
    - _target_: lightning.pytorch.callbacks.LearningRateMonitor
      logging_interval: epoch


# =====================
#    TRAINING MODULE
# =====================
training_module:
  _target_: nequip.train.EMALightningModule
  ema_decay: 0.999

  # ---- Loss ----
  # Train on energy + forces + stress
  loss:
    _target_: nequip.train.EnergyForceStressLoss
    per_atom_energy: true
    coeffs:
      total_energy: 1.0
      forces: 1.0
      stress: 10.0          # stress is typically weighted higher for bulk metallic systems

  # ---- Metrics ----
  val_metrics:
    _target_: nequip.train.EnergyForceStressMetrics
    coeffs:
      total_energy_rmse: 1.0
      forces_rmse: 1.0
      stress_rmse: 1.0
      total_energy_mae: null           # logged but not in weighted_sum
      per_atom_energy_mae: null
      forces_mae: null
      stress_mae: null

  train_metrics: ${training_module.val_metrics}
  test_metrics: ${training_module.val_metrics}

  # ---- Optimizer ----
  optimizer:
    _target_: torch.optim.Adam
    lr: 0.005

  # ---- LR scheduler ----
  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
      factor: 0.5
      patience: 10
      threshold: 0.1
      min_lr: 1e-6
    monitor: ${monitored_metric}
    interval: epoch
    frequency: 1

  # ---- Model ----
  model:
    _target_: nequip.model.NequIPGNNModel

    # -- reproducibility --
    seed: 42
    model_dtype: float32

    # -- atom types and cutoff --
    type_names: ${model_type_names}
    r_max: ${cutoff_radius}

    # -- Bessel radial basis --
    num_bessels: 8
    bessel_trainable: false
    polynomial_cutoff_p: 6

    # -- interaction layers --
    num_layers: ${num_layers}
    l_max: ${l_max}
    parity: true
    num_features: ${num_features}

    # -- radial MLP --
    radial_mlp_depth: 2
    radial_mlp_width: 64

    # -- energy shifts & scales from dataset statistics --
    # Using dataset statistics as a starting point.
    # For production, replace per_type_energy_shifts with isolated atom energies
    # computed from the same EAM potential (run single-atom-in-large-box calculations).
    avg_num_neighbors: ${training_data_stats:num_neighbors_mean}
    per_type_energy_scales: ${training_data_stats:per_type_forces_rms}
    per_type_energy_shifts: ${training_data_stats:per_atom_energy_mean}
    per_type_energy_scales_trainable: false
    per_type_energy_shifts_trainable: true   # allow shifts to adjust during training

    # -- ZBL pair potential --
    # Prior for short-range repulsion, important for MD stability
    pair_potential:
      _target_: nequip.nn.pair_potential.ZBL
      units: metal           # eV and Å (LAMMPS metal units)
      chemical_species: ${chemical_species}

    # -- force/stress output --
    do_derivatives: true     # compute forces and stresses via autograd
